function sfx(n){if(!AC||muted)return;const t=AC.currentTime;

 else if(n=='coin'){tone(988,t,.06,'square',.06);tone(1319,t+.06,.12,'square',.06)}

const THEMES={
 title:{spb:.21,bass:[-24,null,null,null,-17,null,null,null,-20,null,null,null,-19,null,null,null],lead:[12,null,16,19,null,16,12,null,14,null,17,21,null,17,14,null,12,null,16,19,null,23,19,16,14,null,11,null,7,null,null,null]},

 dun:{spb:.15,bass:[-27,null,null,-27,null,null,-27,null,-24,null,null,-24,null,null,-24,null,-29,null,null,-29,null,null,-29,null,-26,null,null,-26,null,-26,null,null],lead:[9,null,12,null,16,null,12,null,9,null,null,null,8,null,null,null,7,null,10,null,14,null,10,null,7,null,8,null,9,null,null,null]},

function musTick(){const th=THEMES[mus.th];if(!th||!AC||muted){if(AC)mus.next=AC.currentTime;return}

 {sky:['#9fd3e8','#eef9ff'],hill:'#c4dfeb',hill2:'#daedf5',blk:'#7fa7c9',top:'#f2fbff',name:'Frostbite Peak',gem:'#a5ecff'},
 {sky:['#f2b04c','#ffe3a8'],hill:'#d99e4a',hill2:'#e6b364',blk:'#b3763a',top:'#e8c05f',name:'Sunscorch Ruins',gem:'#ffb347'},

// ---------- global state ----------

// ---------- overworld gen ----------
const SPAWN={x:26,y:20};
const DOORS=[[12,25],[28,31],[45,22],[43,7],[7,8]],GATE=[26,4];
const CHESTS={'4,32':'hp','47,31':'coin','15,12':'coin2'};
const SIGNS={'28,19':'Welcome, traveler! Five GEMS lie in five dungeons.|Claim them all, then breach the NORTHERN GATE.','24,22':'Move: WASD/Arrows   Attack: X or J|In dungeons: jump with SPACE or Z.  Pause: P  Mute: M','26,8':'The gate ahead hungers for five gems.|Dungeons grow harder to the north and west.'};
function genOv(){ovW=52;ovH=36;seed=1234;
 ov=Array.from({length:ovH},(_,y)=>Array.from({length:ovW},(_,x)=>{
  if(x<2||y<2||x>=ovW-2||y>=ovH-2)return'T';
  const d=((x-13)/6.5)**2+((y-14)/4)**2;if(d<1)return'~';
  return hash(x,y)<.15?'T':'.'}));
 const carve=(x1,y1,x2,y2)=>{let x=x1,y=y1;const step=(nx,ny)=>{for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const c=ov[ny+dy]&&ov[ny+dy][nx+dx];if(c=='T'||c=='~')ov[ny+dy][nx+dx]='.'}ov[ny][nx]=',';x=nx;y=ny};
  while(x!=x2)step(x+Math.sign(x2-x),y);while(y!=y2)step(x,y+Math.sign(y2-y))};
 DOORS.forEach((d,i)=>carve(SPAWN.x,SPAWN.y,d[0],d[1]));carve(SPAWN.x,SPAWN.y,GATE[0],GATE[1]+1);
 carve(SPAWN.x,SPAWN.y,4,32);carve(SPAWN.x,SPAWN.y,47,31);carve(20,14,15,12);
 const clear=(cx,cy,r)=>{for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++)if(ov[y]&&ov[y][x]&&'T~'.includes(ov[y][x]))ov[y][x]='.'};
 clear(SPAWN.x,SPAWN.y,2);DOORS.forEach(d=>clear(d[0],d[1],2));clear(GATE[0],GATE[1],2);
 DOORS.forEach((d,i)=>ov[d[1]][d[0]]=''+(i+1));
 ov[GATE[1]][GATE[0]]='B';ov[GATE[1]][GATE[0]-1]='#';ov[GATE[1]][GATE[0]+1]='#';
 ov[18][24]='H';
 for(const k in CHESTS){const[x,y]=k.split(',').map(Number);clear(x,y,1);ov[y][x]='C'}
 for(const k in SIGNS){const[x,y]=k.split(',').map(Number);ov[y][x]='!'}
 ovEn=[];for(let y=3;y<ovH-3;y++)for(let x=3;x<ovW-3;x++){
  if(ov[y][x]=='.'&&hash(x*7,y*13)>.975&&Math.hypot(x-SPAWN.x,y-SPAWN.y)>8&&ovEn.length<18)
   ovEn.push(mkSlime(x*TS+2,y*TS+3))}}
function mkSlime(x,y){return{x,y,w:12,h:9,vx:0,vy:0,hp:2,hurt:0,t:Math.random()*99,dx:0,dy:0,kx:0,ky:0}}
const ovGet=(x,y)=>(ov[y]&&ov[y][x])||'T';
const ovSolid=(x,y)=>{const c=ovGet(x,y);return c=='T'||c=='#'||c=='~'};
// ---------- level gen (side view) ----------
function genLevel(n){seed=n*9127+77;
 const w=155+n*20,h=11,t=Array.from({length:h},()=>Array(w).fill(' '));
 const col=(x,from)=>{for(let y=from;y<h;y++)t[y][x]='#'};
 let gy=8;for(let x=0;x<7;x++)col(x,gy);
 const en=[],bats=[];let lastCp=0,X=7;
 while(X<w-14){
  if(X-lastCp>42){for(let i=0;i<4;i++)col(X+i,gy);t[gy-1][X+1]='F';lastCp=X;X+=4;continue}
  const r=X<20?rng()*.3:rng();
  if(r<.3){const L=4+(rng()*4|0);for(let i=0;i<L;i++)col(X+i,gy);
   if(rng()<.22+n*.07&&L>4)en.push({x:(X+2)*TS,y:gy*TS-10,w:12,h:10,vx:.45+n*.06,vy:0,hp:1,hurt:0});
   if(rng()<.45)for(let i=1;i<L-1;i++)t[gy-2][X+i]='o';
   if(n>=3&&rng()<.28)bats.push({bx:(X+L/2)*TS,by:(gy-4)*TS,x:0,y:0,t:rng()*9,hp:1,hurt:0,dead:0});
   X+=L}
  else if(r<.5){const G=2+(rng()<.3+n*.1?1:0);for(let i=0;i<G;i++)t[gy-3][X+i]='o';X+=G;
   for(let i=0;i<3;i++)col(X+i,gy);X+=3}
  else if(r<.68){const d=(rng()<.5?-1:1)*(1+(rng()<.35?1:0));gy=clamp(gy+d,4,9);
   for(let i=0;i<4;i++)col(X+i,gy);X+=4}
  else if(r<.84){const L=2+(n>2&&rng()<.5?1:0);
   for(let i=0;i<L;i++){col(X+i,gy);t[gy-1][X+i]='^'}X+=L;
   for(let i=0;i<3;i++)col(X+i,gy);X+=3}
  else{const L=rng()<.5?6:8;
   const p1y=gy-(n>=2&&rng()<.5?1:0);for(let i=0;i<2;i++){t[p1y][X+2+i]='#';t[p1y-2][X+2+i]='o'}
   if(L==8){const p2y=clamp(p1y-1,3,9);for(let i=0;i<2;i++)t[p2y][X+5+i]='#'}
   X+=L;for(let i=0;i<3;i++)col(X+i,gy);X+=3}}
 for(;X<w;X++)col(X,gy);
 t[gy-1][w-4]='D';t[gy-2][w-4]='D';
 lvl={t,w,h,n,en,bats,flags:new Set(),cp:{x:32,y:gy0y(t)},pal:PALS[n-1]};
 function gy0y(t){for(let y=0;y<h;y++)if(t[y][2]=='#')return y*TS-14;return 8*TS-14}
 P.x=32;P.y=lvl.cp.y;P.vx=0;P.vy=0;P.face=1;P.inv=40;}
const lvlSolid=(x,y)=>{if(x<0||x>=lvl.w)return true;const r=lvl.t[y];return r?r[x]=='#':false};
// ---------- physics ----------
function collideAxis(o,solid,ax){
 const l=Math.floor(o.x/TS),r=Math.floor((o.x+o.w-1)/TS),tt=Math.floor(o.y/TS),b=Math.floor((o.y+o.h-1)/TS);
 for(let ty=tt;ty<=b;ty++)for(let tx=l;tx<=r;tx++)if(solid(tx,ty)){
  if(ax==0){if(o.vx>0){o.x=tx*TS-o.w;o.hit=1}else if(o.vx<0){o.x=(tx+1)*TS;o.hit=1}o.vx=0;return}
  else{if(o.vy>0){o.y=ty*TS-o.h;o.vy=0;o.onG=1}else if(o.vy<0){o.y=(ty+1)*TS;o.vy=0}return}}}
function move(o,solid){o.hit=0;o.x+=o.vx;collideAxis(o,solid,0);o.y+=o.vy;collideAxis(o,solid,1)}
const ovl=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
// ---------- particles ----------

// ---------- game flow ----------
function newGame(cont){
 gems=[0,0,0,0,0];coins=0;maxhp=6;playT=0;deaths=0;chestsOpen=new Set();done=false;
 if(cont){try{const s=JSON.parse(localStorage.getItem('gembound'));gems=s.gems;coins=s.coins;maxhp=s.maxhp;playT=s.playT;deaths=s.deaths;chestsOpen=new Set(s.chests);done=!!s.done}catch(e){}}

  if(P.dir=='left'||P.dir=='right')r.w=13;else{r.w=14;r.h=13}}

function topMove(solid,sp){let dx=(mvR()?1:0)-(mvL()?1:0),dy=(mvD()?1:0)-(mvU()?1:0);

  else if(c=='D'&&lvl.t[ty+1]&&lvl.t[ty+1][tx]=='D'){px(x-1,y,18,32,'#3a2c1e');px(x+1,y+3,14,29,'#151019');
   drawGemIcon(x+4,y+8,pal.gem,true);px(x-3,y-3,22,4,pal.top)}}
 for(const e of lvl.en)if(e.hp>0&&Math.abs(e.x-cam.x-160)<200)drawWalker(e);
 for(const b of lvl.bats)if(!b.dead)drawBat(b);
 drawHero(P.x,P.y,true);dParts();g.restore();
 hud();txt(pal.name,5,H-5,'#fff','7px monospace')}
function dGem(){const pal=lvl.pal;dSideBg(pal);
 g.fillStyle='rgba(0,0,0,.5)';g.fillRect(0,0,W,H);
 const y=110-Math.min(gemT,40)*1.2;
 for(let i=0;i<8;i++){const a=frame/14+i*.785;px(W/2+Math.cos(a)*26-1,y+6+Math.sin(a)*26-1,2,2,'#fff')}
 g.save();g.translate(W/2-8,y);g.scale(4,4);drawGemIcon(0,0,pal.gem);g.restore();
 if(gemT>35){txt('GEM GET!',W/2,70,'#fff','bold 16px monospace','center');
  txt(pal.name+' cleared  ·  '+ (gemCount()) +'/5 gems',W/2,150,'#ffd','8px monospace','center')}}
function dBoss(){
 const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#1a0c14');gr.addColorStop(1,'#2c1220');g.fillStyle=gr;g.fillRect(0,0,W,H);
 g.save();g.translate(-(cam.x|0)+(shake?(Math.random()*shake-shake/2)|0:0),-(cam.y|0)+(shake?(Math.random()*shake-shake/2)|0:0));
 for(let ty=0;ty<12;ty++)for(let tx=0;tx<22;tx++){const x=tx*TS,y=ty*TS;
  if(arena[ty][tx]=='#'){px(x,y,TS,TS,'#4a3644');px(x+1,y+1,14,4,'#5c4454')}
  else{px(x,y,TS,TS,(tx+ty)%2?'#6b4a5e':'#734f65');if(hash(tx,ty)<.2)px(x+4,y+6,3,2,'rgba(0,0,0,.15)')}}
 const B=boss;
 if(B.st!='dead'||B.t>0){const bx=B.x|0,by=B.y|0,fl=(B.ihit>0||B.st=='ctel')&&(frame>>1)&1;
  const bod=fl?'#fff':B.st=='stun'?'#7a7a88':'#5c5c6e';
  g.fillStyle='rgba(0,0,0,.3)';g.fillRect(bx+2,by+26,24,3);
  const bo=B.st=='stun'?2:Math.sin(frame/12)*2;
  px(bx+2,by+4+bo,24,18,bod);px(bx+5,by+bo,18,6,bod);px(bx,by+8+bo,4,10,bod);px(bx+24,by+8+bo,4,10,bod);
  px(bx+4,by+22+bo,6,5,bod);px(bx+18,by+22+bo,6,5,bod);
  const gc=PALS[(frame>>4)%5].gem;px(bx+11,by+10+bo,6,7,gc);px(bx+12,by+11+bo,2,2,'#fff');
  const ex=clamp(Math.sign(P.x-B.x),-1,1);
  if(B.st=='stun'){txt('x  x',bx+14,by+5+bo,'#111','bold 7px monospace','center')}
  else{px(bx+8+ex,by+3+bo,3,3,'#ff3344');px(bx+17+ex,by+3+bo,3,3,'#ff3344')}
  if(B.hp<30){px(bx+6,by+8+bo,1,6,'#2c2c36');px(bx+20,by+12+bo,1,5,'#2c2c36')}}
 for(const s of bEn)if(s.hp>0)drawSlime(s);
 for(const b of bullets){px(b.x-2,b.y-2,4,4,'#ff77aa');px(b.x-1,b.y-1,2,2,'#fff')}
 drawHero(P.x,P.y,false);dParts();g.restore();
 hud();
 px(W/2-62,H-14,124,7,'#20101a');px(W/2-60,H-12,120*Math.max(0,boss.hp)/boss.mhp,3,'#e33');
 txt('GEM GOLEM',W/2,H-16,'#fbb','7px monospace','center')}
function dTitle(){
 const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#141a33');gr.addColorStop(1,'#3c2a4d');g.fillStyle=gr;g.fillRect(0,0,W,H);
 for(let i=0;i<40;i++){const tw=hash(i,9)*99;px(hash(i,1)*W,hash(i,2)*100,1,1,(frame/8+tw)%9<5?'#fff':'#667')}
 g.fillStyle='#232b45';for(let x=0;x<W;x+=4)g.fillRect(x,H-40+Math.sin((x+frame*.4)/38)*8,4,60);
 g.fillStyle='#1a2138';for(let x=0;x<W;x+=4)g.fillRect(x,H-22+Math.sin((x+frame*.8)/24)*5,4,40);
 // running hero
 const hx=(frame*.9)%(W+60)-30;g.save();g.translate(hx,H-36);
 px(2,10,2,3,'#35406e');px(6,10+((frame>>2)&1),2,3,'#35406e');px(1,4,8,7,'#3fa34d');px(1,4,8,2,'#57c26a');px(1,-1,8,6,'#f2c99a');px(1,-1,8,2,'#8a4a22');px(7,1,1,2,'#26221f');g.restore();
 for(let i=0;i<5;i++)drawGemIcon(W/2-38+i*17,32+Math.sin(frame/16+i)*3,PALS[i].gem,true);
 txt('GEMBOUND',W/2+2,72,'#000','bold 26px monospace','center');
 txt('GEMBOUND',W/2,70,'#ffd75e','bold 26px monospace','center');
 txt('a tale of two perspectives',W/2,84,'#9aa5c9','8px monospace','center');
 const opts=hasSave()?['NEW GAME','CONTINUE'+(done?' ★':'')]:['NEW GAME'];
 opts.forEach((o,i)=>{const y=112+i*14;
  if(sel==i){txt('▶',W/2-46,y,'#ffd75e','8px monospace');txt(o,W/2,y,'#fff','bold 9px monospace','center')}
  else txt(o,W/2,y,'#8890b0','9px monospace','center')});
 txt('WASD/Arrows move · Space/Z jump · X/J sword · P pause · M mute',W/2,158,'#667','7px monospace','center');
 if((frame>>5)&1)txt('- PRESS ENTER -',W/2,146,'#cfd8dc','8px monospace','center');
 dParts()}
function dWin(){const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#1a2447');gr.addColorStop(1,'#5e3a63');g.fillStyle=gr;g.fillRect(0,0,W,H);
 dParts();
 txt('YOU ARE GEMBOUND',W/2,46,'#ffd75e','bold 18px monospace','center');
 txt('The golem crumbles. Light returns to the realm.',W/2,64,'#cfd8dc','8px monospace','center');
 for(let i=0;i<5;i++)drawGemIcon(W/2-42+i*19,76+Math.sin(frame/12+i)*2,PALS[i].gem,true);
 const m=Math.floor(playT/3600),s=Math.floor(playT/60)%60;
 txt('Time  '+m+'m '+(s<10?'0':'')+s+'s',W/2,108,'#fff','8px monospace','center');
 txt('Coins '+coins+'    Faints '+deaths,W/2,120,'#fff','8px monospace','center');
 txt('Thanks for playing!',W/2,140,'#9aa5c9','8px monospace','center');
 if(winT>90&&(frame>>5)&1)txt('- ENTER -',W/2,158,'#cfd8dc','8px monospace','center')}
function dMsg(){px(10,H-46,W-20,38,'rgba(10,10,20,.92)');
 g.strokeStyle='#8890b0';g.strokeRect(10.5,H-45.5,W-21,37);
 const lines=msg.s.split('|');let shown=msg.i;
 lines.forEach((ln,i)=>{if(shown<=0)return;txt(ln.slice(0,shown),18,H-32+i*11,'#fff','8px monospace');shown-=ln.length});
 if(msg.i>=msg.s.length&&(frame>>4)&1)txt('▼',W-24,H-14,'#ffd75e','8px monospace')}
function draw(){g.imageSmoothingEnabled=false;g.clearRect(0,0,W,H);
 if(st=='title')dTitle();else if(st=='top')dOverworld();else if(st=='side')dSide();
 else if(st=='gem')dGem();else if(st=='boss')dBoss();else if(st=='win')dWin();
 if(banner){const a=banner.t<20?banner.t/20:banner.t>110?(150-banner.t)/40:1;
  g.globalAlpha=clamp(a,0,1);px(0,26,W,16,'rgba(0,0,0,.55)');txt('— '+banner.s+' —',W/2,37,'#ffd75e','bold 9px monospace','center');g.globalAlpha=1}
 if(msg&&st!='title')dMsg();
 if(paused){g.fillStyle='rgba(0,0,0,.6)';g.fillRect(0,0,W,H);
  txt('PAUSED',W/2,80,'#fff','bold 16px monospace','center');
  txt('P resume · M mute',W/2,100,'#cfd8dc','8px monospace','center')}
 if(fade.a>0){g.fillStyle='#000';const r=(1-fade.a)*Math.hypot(W,H)/2;
  g.beginPath();g.rect(0,0,W,H);g.arc(W/2,H/2,Math.max(0,r),0,6.29,true);g.fill()}}
// ---------- main loop ----------
let acc=0,last=performance.now();
function loop(ts){requestAnimationFrame(loop);acc+=Math.min(60,ts-last);last=ts;
 let n=0;while(acc>=16.66&&n++<4){update();acc-=16.66}draw()}
requestAnimationFrame(loop);
setTheme('title');
</script></body></html>
