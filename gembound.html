 if(pal.wx==2)for(let i=0;i<10;i++){const sx=(hash(i,1)*W+frame*(1+hash(i,2)))%W;px(sx,H-30-hash(i,5)*60,3,1,'rgba(255,230,170,.5)')}}
function dSideTile(c,tx,ty,pal){const x=tx*TS,y=ty*TS;
 if(c=='#'){px(x,y,TS,TS,pal.blk);
  const above=ty==0||lvl.t[ty-1][tx]!='#';
  if(above){px(x,y,TS,4,pal.top);px(x,y,TS,1,pal.top2);px(x,y+4,TS,1,'rgba(0,0,0,.25)');
   if(lvl.n==1&&hash(tx,7)<.4){px(x+2,y-2,1,2,'#66c95f');px(x+7,y-3,1,3,'#4caf50');px(x+12,y-2,1,2,'#66c95f')}}
  if(tx==0||lvl.t[ty][tx-1]!='#')px(x,y,1,TS,'rgba(255,255,255,.15)');
  if(tx>=lvl.w-1||lvl.t[ty][tx+1]!='#')px(x+15,y,1,TS,'rgba(0,0,0,.3)');
  if(hash(tx,ty)<.3)px(x+3+(hash(tx,ty)*20|0)%8,y+7+(hash(ty,tx)*20|0)%6,4,3,'rgba(0,0,0,.14)');
  if(hash(tx,ty)>.85)px(x+5,y+9,3,2,pal.blk2)}
 else if(c=='^'){px(x,y+13,TS,3,'#777');g.fillStyle='#d8d8e2';
  for(let i=0;i<2;i++){g.beginPath();g.moveTo(x+i*8,y+14);g.lineTo(x+i*8+4,y+3);g.lineTo(x+i*8+8,y+14);g.fill();px(x+i*8+3,y+5,1,4,'#fff')}}
 else if(c=='o'){const w2=Math.abs(Math.sin(frame/9+tx))*5+1;px(x+8-w2/2,y+4,w2,8,'#ffd700');px(x+8-w2/2,y+5,w2,2,'#fff3b0');
  if((frame+tx*13)%60<5)px(x+11,y+2,2,2,'#fff')}
 else if(c=='F'){px(x+7,y,2,16,'#8a6430');px(x+7,y,1,16,'#a87c42');const on=lvl.flags.has(tx);g.fillStyle=on?'#4caf50':'#b0483e';
  const wv=Math.sin(frame/8)*1.5;g.beginPath();g.moveTo(x+9,y+1);g.lineTo(x+17+wv,y+4);g.lineTo(x+9,y+8);g.fill();
  if(on&&(frame>>3)%4==0)px(x+12,y-2,1,1,'#8f8')}
 else if(c=='p'){px(x+3,y+6,10,9,'#c98a56');px(x+4,y+4,8,3,'#a86e40');px(x+5,y+15,6,1,'#8a5a34');px(x+4,y+8,2,5,'#e0aa76')}
 else if(c=='S'){const sq=lvl.springT[tx]>0?4:0;px(x+2,y+12+sq/2,12,4-sq/2,'#888');
  px(x+3,y+8+sq,10,2,'#aaa');px(x+4,y+10+sq,8,1,'#777');px(x+2,y+6+sq,12,3,'#d9534f')}
 else if(c=='?'){px(x+7,y+6,2,10,'#6e4a2a');px(x+2,y,12,8,'#c9a86a');px(x+2,y,12,1,'#e0c88c');T('?',x+8,y+2,'#5a3a1a',1,'center')}
 else if(c=='D'&&lvl.t[ty+1]&&lvl.t[ty+1][tx]=='D'){px(x-1,y,18,32,'#3a2c1e');px(x+1,y+3,14,29,'#151019');
  const gl=Math.sin(frame/15)*.3+.5;g.fillStyle='rgba(255,255,180,'+gl*.14+')';g.fillRect(x-4,y-2,24,34);
  drawGemIcon(x+4,y+8,pal.gem,true);px(x-3,y-3,22,4,pal.top);px(x-3,y-3,22,1,pal.top2)}}
function dSide(){const pal=lvl.pal;dSideBg(pal);
 g.save();g.translate(-(cam.x|0)+(shake?(Math.random()*shake-shake/2)|0:0),-(cam.y|0));
 const x0=Math.floor(cam.x/TS);
 for(let ty=0;ty<lvl.h;ty++)for(let tx=x0;tx<=x0+21&&tx<lvl.w;tx++){
  const c=lvl.t[ty][tx];if(c!=' ')dSideTile(c,tx,ty,pal)}
 for(const e of lvl.en)if(e.hp>0&&Math.abs(e.x-cam.x-160)<200)drawWalker(e);
 for(const b of lvl.bats)if(!b.dead)drawBat(b);
 for(const s of lvl.spit)drawSpitter(s);
 for(const pr of lvl.proj){px(pr.x-2,pr.y-2,4,4,'#8c6');px(pr.x-1,pr.y-1,2,2,'#cfa')}
 g.restore();
 g.save();g.translate(-(cam.x|0),-(cam.y|0));drawHeroSide(P.x,P.y);dParts();g.restore();
 hud();T(pal.name,5,H-9,'#fff');
 if(P.inv>55){g.fillStyle='rgba(255,0,0,'+((P.inv-55)/15*.25)+')';g.fillRect(0,0,W,H)}}
function dGem(){const pal=lvl.pal;dSideBg(pal);
 g.fillStyle='rgba(0,0,0,.55)';g.fillRect(0,0,W,H);
 const y=104-Math.min(gemT,40)*1.2;
 for(let i=0;i<8;i++){const a=frame/14+i*.785;px(W/2+Math.cos(a)*(26+Math.sin(frame/9)*4)-1,y+6+Math.sin(a)*26-1,2,2,'#fff')}
 g.save();g.translate(W/2-8,y);g.scale(4,4);drawGemIcon(0,0,pal.gem);g.restore();
 if(gemT>35){T('GEM GET!',W/2,64,'#fff',3,'center');
  T(pal.name+' CLEARED - '+gemCount()+'/5 GEMS',W/2,150,'#ffd',1,'center')}}
// ---------- boss drawing (iso) ----------
function dBoss(){
 const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#140a10');gr.addColorStop(1,'#2c1220');g.fillStyle=gr;g.fillRect(0,0,W,H);
 g.save();g.translate(-(cam.x|0)+(shake?(Math.random()*shake-shake/2)|0:0),-(cam.y|0)+(shake?(Math.random()*shake-shake/2)|0:0));
 const list=[];
 for(let ty=0;ty<12;ty++)for(let tx=0;tx<22;tx++){
  const cx=isoX(tx*TS,ty*TS),cy=isoY(tx*TS,ty*TS)+8;
  if(arena[ty][tx]=='#')list.push({d:(tx+ty)*TS+TS,f:()=>isoBlock(cx,cy,14,'#5c4454','#4a3644','#3b2b36')});
  else{diamond(cx,cy,(tx+ty)%2?'#6b4a5e':'#734f65');if(hash(tx,ty)<.15)px(cx-3,cy-1,4,2,'rgba(0,0,0,.18)')}}
 const B=boss;
 if(B.st!='dead'||B.t>0){const bsx=isoX(B.x+14,B.y+13),bsy=isoY(B.x+14,B.y+13);
  list.push({d:B.x+B.y+26,f:()=>{
   g.fillStyle='rgba(0,0,0,.3)';g.beginPath();g.ellipse(bsx,bsy+4,14,5,0,0,7);g.fill();
   const fl=(B.ihit>0||B.st=='ctel')&&(frame>>1)&1;
   const bod=fl?'#fff':B.st=='stun'?'#7a7a88':'#5c5c6e';
   const bo=B.st=='stun'?2:Math.sin(frame/12)*2,x=bsx-14,y=bsy-30+bo;
   px(x+2,y+4,24,18,bod);px(x+5,y,18,6,bod);px(x,y+8,4,10,bod);px(x+24,y+8,4,10,bod);
   px(x+4,y+22,6,5,bod);px(x+18,y+22,6,5,bod);
   const gc=PALS[(frame>>4)%5].gem;px(x+11,y+10,6,7,gc);px(x+12,y+11,2,2,'#fff');
   const ex=clamp(Math.sign(P.x-B.x),-1,1);
   if(B.st=='stun')T('X X',x+14,y+2,'#111',1,'center');
   else{px(x+8+ex,y+3,3,3,'#ff3344');px(x+17+ex,y+3,3,3,'#ff3344')}
   if(B.hp<30){px(x+6,y+8,1,6,'#2c2c36');px(x+20,y+12,1,5,'#2c2c36')}}})}
 for(const s of bEn)if(s.hp>0){const sx=isoX(s.x+6,s.y+5),sy=isoY(s.x+6,s.y+5);
  list.push({d:s.x+s.y,f:()=>{g.fillStyle='rgba(0,0,0,.25)';g.beginPath();g.ellipse(sx,sy+4,6,3,0,0,7);g.fill();drawSlime(sx-6,sy-7,s)}})}
 for(const b of bullets){const sx=isoX(b.x,b.y),sy=isoY(b.x,b.y);
  list.push({d:b.x+b.y,f:()=>{g.fillStyle='rgba(0,0,0,.2)';g.beginPath();g.ellipse(sx,sy+3,3,1.5,0,0,7);g.fill();
   px(sx-2,sy-8,4,4,'#ff77aa');px(sx-1,sy-7,2,2,'#fff')}})}
 list.push({d:P.x+P.y+14,f:()=>drawHeroIso(isoX(P.x+5,P.y+7),isoY(P.x+5,P.y+7)+4)});
 list.sort((a,b)=>a.d-b.d);for(const it of list)it.f();
 dParts(true);g.restore();hud();
 px(W/2-62,H-14,124,7,'#20101a');px(W/2-60,H-12,120*Math.max(0,boss.hp)/boss.mhp,3,'#e33');px(W/2-60,H-12,120*Math.max(0,boss.hp)/boss.mhp,1,'#f88');
 T('GEM GOLEM',W/2,H-22,'#fbb',1,'center')}
// ---------- title/win ----------
function dTitle(){
 const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#141a33');gr.addColorStop(1,'#3c2a4d');g.fillStyle=gr;g.fillRect(0,0,W,H);
 for(let i=0;i<40;i++){const tw=hash(i,9)*99;px(hash(i,1)*W,hash(i,2)*100,1,1,(frame/8+tw)%9<5?'#fff':'#667')}
 // floating iso island
 const ix2=W-58,iy2=118+Math.sin(frame/40)*3;
 for(let ty=0;ty<3;ty++)for(let tx=0;tx<3;tx++){const cx=ix2+(tx-ty)*16,cy=iy2+(tx+ty)*8-16;
  isoBlock(cx,cy,12,'#3e8948','#5a4030','#453022')}
 drawTree(ix2-32,iy2+2,1,2);
 const savedP=P;P={dir:'down',mov:0,blink:frame%180<6?4:0,atk:0,inv:0,trail:[],x:0,y:0};
 drawHeroIso(ix2+10,iy2+2);P=savedP;
 for(let i=0;i<5;i++)drawGemIcon(W/2-42+i*19,26+Math.sin(frame/16+i)*3,PALS[i].gem,true);
 T('GEMBOUND',W/2+2,48,'#5a3a10',4,'center');T('GEMBOUND',W/2,46,'#ffd75e',4,'center');
 T('II',W/2+86,42,'#fff',2,'center');
 T('A TALE OF TWO PERSPECTIVES',W/2,72,'#9aa5c9',1,'center');
 const opts=hasSave()?['NEW GAME','CONTINUE'+(done?' *':'')]:['NEW GAME'];
 opts.forEach((o,i)=>{const y=92+i*13;
  if(sel==i){T('>',W/2-40,y,'#ffd75e');T(o,W/2,y,'#fff',1,'center')}
  else T(o,W/2,y,'#8890b0',1,'center')});
 T('ARROWS/WASD MOVE - SPACE/Z JUMP - X/J SWORD - C DASH',W/2,166,'#667',1,'center');
 T('P PAUSE - M MUTE',W/2,173,'#667',1,'center');
 if((frame>>5)&1)T('- PRESS ENTER -',W/2,124,'#cfd8dc',1,'center');
 dParts()}
function dWin(){const gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#1a2447');gr.addColorStop(1,'#5e3a63');g.fillStyle=gr;g.fillRect(0,0,W,H);
 dParts();
 T('YOU ARE GEMBOUND',W/2,38,'#ffd75e',2,'center');
 T('THE GOLEM CRUMBLES. LIGHT RETURNS TO THE REALM.',W/2,58,'#cfd8dc',1,'center');
 for(let i=0;i<5;i++)drawGemIcon(W/2-42+i*19,70+Math.sin(frame/12+i)*2,PALS[i].gem,true);
 const m=Math.floor(playT/3600),s=Math.floor(playT/60)%60;
 T('TIME  '+m+'M '+(s<10?'0':'')+s+'S',W/2,100,'#fff',1,'center');
 T('COINS '+coins+'   FAINTS '+deaths,W/2,112,'#fff',1,'center');
 T('THANKS FOR PLAYING!',W/2,134,'#9aa5c9',1,'center');
 if(winT>90&&(frame>>5)&1)T('- ENTER -',W/2,156,'#cfd8dc',1,'center')}
function dMsg(){px(10,H-46,W-20,38,'rgba(10,10,20,.93)');
 g.strokeStyle='#8890b0';g.strokeRect(10.5,H-45.5,W-21,37);px(10,H-46,W-20,1,'#c9cfe8');
 const lines=msg.s.split('|');let shown=msg.i|0;
 lines.forEach((ln,i)=>{if(shown<=0)return;T(ln.slice(0,shown),18,H-40+i*10,'#fff');shown-=ln.length});
 if(msg.i>=msg.s.length&&(frame>>4)&1)T('~',W-24,H-15,'#ffd75e')}
function draw(){g.imageSmoothingEnabled=false;g.clearRect(0,0,W,H);
 if(st=='title')dTitle();else if(st=='top')dOverworld();else if(st=='side')dSide();
 else if(st=='gem')dGem();else if(st=='boss')dBoss();else if(st=='win')dWin();
 if(banner){const a=banner.t<20?banner.t/20:banner.t>110?(150-banner.t)/40:1;
  g.globalAlpha=clamp(a,0,1);px(0,26,W,14,'rgba(0,0,0,.55)');T('- '+banner.s+' -',W/2,31,'#ffd75e',1,'center');g.globalAlpha=1}
 if(msg&&st!='title')dMsg();
 if(paused){g.fillStyle='rgba(0,0,0,.6)';g.fillRect(0,0,W,H);
  T('PAUSED',W/2,70,'#fff',2,'center');
  T('P RESUME - M MUTE',W/2,92,'#cfd8dc',1,'center');
  if(dash)T('DASH: C / K / SHIFT',W/2,102,'#7fe3a0',1,'center')}
 if(fade.a>0){g.fillStyle='#000';const r=(1-fade.a)*Math.hypot(W,H)/2;
  g.beginPath();g.rect(0,0,W,H);g.arc(W/2,H/2,Math.max(0,r),0,6.29,true);g.fill()}}
// ---------- loop ----------
let acc=0,last=performance.now();
function loop(ts){requestAnimationFrame(loop);acc+=Math.min(60,ts-last);last=ts;
 let n=0;while(acc>=16.66&&n++<4){update();acc-=16.66}draw()}
requestAnimationFrame(loop);
setTheme('title');
</script></body></html>
